<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#AA8C2C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="120" fill="#0A0A0F" rx="8"/>
  
  <g transform="translate(50, 20)">
    <path d="M30 0 L35 15 L50 15 L38 24 L43 40 L30 30 L17 40 L22 24 L10 15 L25 15 Z" 
          fill="url(#goldGradient)" filter="url(#glow)"/>
  </g>
  
  <text x="95" y="75" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#goldGradient)" filter="url(#glow)">
    Ask Gamblers
  </text>
  
  <text x="95" y="100" font-family="Arial, sans-serif" font-size="16" fill="#8B7355" letter-spacing="2">
    המדריך לקזינו אונליין
  </text>
  
  <rect x="95" y="105" width="280" height="2" fill="url(#goldGradient)" opacity="0.5"/>
  
  <g transform="translate(500, 35)">
    <circle cx="25" cy="25" r="20" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
    <text x="25" y="32" font-family="Arial, sans-serif" font-size="20" fill="url(#goldGradient)" text-anchor="middle">♠</text>
  </g>
</svg>
