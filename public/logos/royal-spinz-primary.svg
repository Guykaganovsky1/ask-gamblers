<!-- Royal Spinz — Primary Logo (Dark) — v2 post-critique -->
<!-- Generated by Claude Code Logo Skill + Gemini critique -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" shape-rendering="geometricPrecision">
  <title>Royal Spinz — Luxury Casino</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400&display=swap');
  </style>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F0D875"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9B7A28"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="6" fill="url(#bgGrad)"/>

  <!-- Crown Icon — clean geometric, no blur, scalable -->
  <g id="icon" transform="translate(18, 10)">
    <polygon
      points="0,74 0,56 14,30 23,48 40,20 57,48 66,30 80,56 80,74"
      fill="url(#goldGrad)"
    />
    <!-- Clean base band -->
    <rect x="0" y="65" width="80" height="9" fill="#9B7A28" opacity="0.6"/>
    <!-- Three diamond dots at peaks — large enough to be visible at all sizes -->
    <circle cx="40" cy="17" r="5" fill="#F5EDD6"/>
    <circle cx="14" cy="28" r="3.5" fill="#EDD97A"/>
    <circle cx="66" cy="28" r="3.5" fill="#EDD97A"/>
  </g>

  <!-- Subtle vertical divider -->
  <rect x="114" y="28" width="1" height="64" fill="#C9A84C" opacity="0.35"/>

  <!-- Wordmark -->
  <g id="wordmark">
    <text
      x="128" y="69"
      font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
      font-size="40"
      font-weight="600"
      letter-spacing="1"
      fill="#F5EDD6"
    >Royal Spinz</text>
    <!-- Tagline — larger, tighter spacing, readable -->
    <text
      x="130" y="89"
      font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
      font-size="11.5"
      font-weight="400"
      letter-spacing="3"
      fill="#C9A84C"
    >PLAY SMART · WIN ROYAL</text>
  </g>
</svg>
