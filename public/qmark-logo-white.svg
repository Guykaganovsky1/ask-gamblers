<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img">
  <title>Ask Gamblers - White Logo</title>
  <g id="icon" transform="translate(30, 35)">
    <path d="M 60 15 L 105 60 L 60 105 L 15 60 Z"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          shape-rendering="geometricPrecision"/>
    <text x="60" y="62"
          font-family="Arial, sans-serif"
          font-size="52"
          font-weight="900"
          fill="#FFFFFF"
          text-anchor="middle"
          dominant-baseline="central"
          shape-rendering="geometricPrecision">?</text>
  </g>
  <g id="wordmark" transform="translate(155, 50)">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="32"
          font-weight="900"
          fill="#FFFFFF"
          letter-spacing="-0.5">Ask Gamblers</text>
    <line x1="0" y1="12" x2="140" y2="12"
          stroke="#FFFFFF"
          stroke-width="1.5"
          shape-rendering="geometricPrecision"/>
  </g>
  <g id="tagline" transform="translate(155, 85)">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="11"
          font-weight="500"
          fill="#E0E0E0"
          letter-spacing="1.2"
          text-transform="uppercase">Professional • Trusted • Expert</text>
  </g>
</svg>
