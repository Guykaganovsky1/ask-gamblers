<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" role="img">
  <title>Ask Gamblers - Neon Logo (White)</title>
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="whiteToLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8B4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon "i" -->
  <g filter="url(#strongGlow)">
    <text x="80" y="135"
          font-family="Arial, sans-serif"
          font-size="95"
          font-weight="900"
          fill="#FFFFFF"
          stroke="#F5F5F5"
          stroke-width="0.8"
          text-anchor="middle"
          dominant-baseline="central">i</text>
  </g>

  <!-- Text: Ask Gamblers -->
  <g filter="url(#strongGlow)">
    <text x="180" y="110" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="#FFFFFF"
          letter-spacing="2"
          shape-rendering="geometricPrecision">Ask</text>
    
    <text x="180" y="155" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="url(#whiteToLight)"
          letter-spacing="2"
          shape-rendering="geometricPrecision">Gamblers</text>
  </g>

  <!-- Tagline -->
  <g filter="url(#neonGlow)">
    <text x="180" y="195" 
          font-family="Arial, sans-serif" 
          font-size="11" 
          font-weight="500" 
          fill="#F5F5F5"
          letter-spacing="1.5"
          opacity="0.8">neon elite gaming</text>
  </g>
</svg>
