<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img">
  <title>Ask Gamblers Favicon</title>
  <defs>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="femerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1FFF89;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="32" height="32" fill="#0A0A0F"/>

  <!-- Simplified Shield -->
  <g transform="translate(6, 4)">
    <path d="M 10 2 L 18 2 L 18 10 Q 14 16 10 18 Q 6 16 2 10 L 2 2 Z"
          fill="url(#fgold)" stroke="#D4AF37" stroke-width="0.5"/>

    <!-- Center accent -->
    <circle cx="10" cy="10" r="1.5" fill="url(#femerald)"/>
  </g>
</svg>