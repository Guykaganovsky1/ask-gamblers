<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" role="img">
  <title>Ask Gamblers - Text Only Logo</title>
  <defs>
    <!-- Glow Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Color Gradients -->
    <linearGradient id="purpleCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2DD1;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="whiteToLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8B4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ask - Shadow/Glow Layer -->
  <text x="10" y="50" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="900" 
        fill="none"
        stroke="#00FFFF" 
        stroke-width="1.5"
        letter-spacing="2"
        filter="url(#strongGlow)"
        opacity="0.5">Ask</text>

  <!-- Gamblers - Shadow/Glow Layer -->
  <text x="10" y="100" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="900" 
        fill="none"
        stroke="url(#whiteToLight)" 
        stroke-width="1.5"
        letter-spacing="2"
        filter="url(#strongGlow)"
        opacity="0.5">Gamblers</text>

  <!-- Ask - Main -->
  <text x="10" y="50" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="900" 
        fill="#00FFFF"
        letter-spacing="2"
        filter="url(#neonGlow)"
        shape-rendering="geometricPrecision">Ask</text>

  <!-- Gamblers - Main -->
  <text x="10" y="100" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="900" 
        fill="url(#whiteToLight)"
        letter-spacing="2"
        filter="url(#neonGlow)"
        shape-rendering="geometricPrecision">Gamblers</text>
</svg>
