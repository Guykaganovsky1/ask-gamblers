<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" role="img">
  <title>Ask Gamblers - Neon Logo</title>
  <defs>
    <!-- Glow Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Color Gradients -->
    <linearGradient id="purpleCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2DD1;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="whiteToLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8B4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon "i" - Outer (Orange Glow) -->
  <g filter="url(#strongGlow)">
    <text x="80" y="135"
          font-family="Arial, sans-serif"
          font-size="95"
          font-weight="900"
          fill="none"
          stroke="#FF6B00"
          stroke-width="2"
          text-anchor="middle"
          dominant-baseline="central"
          opacity="0.8">i</text>
  </g>

  <!-- Icon "i" - Main (Purple to Cyan) -->
  <g filter="url(#neonGlow)">
    <text x="80" y="135"
          font-family="Arial, sans-serif"
          font-size="95"
          font-weight="900"
          fill="url(#purpleCyan)"
          stroke="#00FFFF"
          stroke-width="1"
          text-anchor="middle"
          dominant-baseline="central">i</text>
  </g>

  <!-- Text: Ask Gamblers (No space) -->
  <g filter="url(#strongGlow)">
    <!-- Ask Shadow/Glow Layer -->
    <text x="180" y="110" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="none"
          stroke="#00FFFF" 
          stroke-width="2"
          letter-spacing="2"
          opacity="0.6">Ask</text>
    
    <!-- Gamblers Shadow/Glow Layer (White to Purple) -->
    <text x="180" y="155" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="none"
          stroke="url(#whiteToLight)" 
          stroke-width="2"
          letter-spacing="2"
          opacity="0.6">Gamblers</text>
  </g>

  <!-- Main Text Layer -->
  <g filter="url(#neonGlow)">
    <!-- Ask in Cyan -->
    <text x="180" y="110" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="#00FFFF"
          letter-spacing="2"
          shape-rendering="geometricPrecision">Ask</text>
    
    <!-- Gamblers in White to Purple -->
    <text x="180" y="155" 
          font-family="Arial, sans-serif" 
          font-size="56" 
          font-weight="900" 
          fill="url(#whiteToLight)"
          letter-spacing="2"
          shape-rendering="geometricPrecision">Gamblers</text>
  </g>

  <!-- Tagline - lowercase, small -->
  <g filter="url(#neonGlow)">
    <text x="180" y="195" 
          font-family="Arial, sans-serif" 
          font-size="11" 
          font-weight="500" 
          fill="#00FFFF"
          letter-spacing="1.5"
          opacity="0.8">neon elite gaming</text>
  </g>
</svg>
