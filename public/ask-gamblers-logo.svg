<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Ask Gamblers Logo</title>
  <desc id="desc">Compact casino badge-style Ask Gamblers logo with angled cards and a gold underline.</desc>
  <defs>
    <linearGradient id="agGold" x1="80" y1="18" x2="292" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3D982"/>
      <stop offset="0.45" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8D6B1F"/>
    </linearGradient>
    <linearGradient id="agCard" x1="112" y1="8" x2="244" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202536"/>
      <stop offset="1" stop-color="#090A10"/>
    </linearGradient>
    <filter id="agTextShadow" x="-10%" y="-30%" width="120%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <filter id="agCardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g id="cards" filter="url(#agCardShadow)">
    <rect x="91" y="13" width="132" height="70" rx="11" fill="#0A0A0F" stroke="#4E421E" stroke-width="2.5" transform="rotate(-17 157 48)"/>
    <rect x="125" y="8" width="138" height="74" rx="12" fill="url(#agCard)" stroke="url(#agGold)" stroke-width="2.8" transform="rotate(8 194 45)"/>
    <path d="M145 24 L154 40 L145 56 L136 40 Z" fill="#D4AF37" opacity="0.95"/>
    <path d="M242 25 L251 41 L242 57 L233 41 Z" fill="#D4AF37" opacity="0.72"/>
    <path d="M166 21 L179 15" stroke="#F3D982" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g id="wordmark" filter="url(#agTextShadow)">
    <text x="180" y="55"
          text-anchor="middle"
          font-family="Arial Black, Arial, Helvetica, sans-serif"
          font-size="50"
          font-weight="900"
          letter-spacing="-1.6"
          fill="#FFFFFF"
          stroke="#FFFFFF"
          stroke-width="0.35">Ask</text>
    <text x="180" y="91"
          text-anchor="middle"
          font-family="Arial Black, Arial, Helvetica, sans-serif"
          font-size="56"
          font-weight="900"
          letter-spacing="-2.1"
          fill="#FFFFFF"
          stroke="#FFFFFF"
          stroke-width="0.35">Gamblers</text>
  </g>

  <path id="gold-underline" d="M24 98 C80 113 280 113 336 98" fill="none" stroke="url(#agGold)" stroke-width="4" stroke-linecap="round"/>
  <path id="emerald-glint" d="M132 102 C158 107 202 107 228 102" fill="none" stroke="#00E676" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
</svg>
