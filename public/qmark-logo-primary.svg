<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img">
  <title>Ask Gamblers - Primary Logo</title>
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7D4FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2DD1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g id="icon" transform="translate(30, 35)">
    <path d="M 60 15 L 105 60 L 60 105 L 15 60 Z"
          fill="none"
          stroke="url(#purpleGradient)"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          shape-rendering="geometricPrecision"/>
    <text x="60" y="62"
          font-family="Arial, sans-serif"
          font-size="52"
          font-weight="900"
          fill="url(#purpleGradient)"
          text-anchor="middle"
          dominant-baseline="central"
          shape-rendering="geometricPrecision">?</text>
  </g>

  <g id="wordmark" transform="translate(155, 50)">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="32"
          font-weight="900"
          fill="#6B2DD1"
          letter-spacing="-0.5">Ask Gamblers</text>
    <line x1="0" y1="12" x2="140" y2="12"
          stroke="url(#purpleGradient)"
          stroke-width="1.5"
          shape-rendering="geometricPrecision"/>
  </g>

  <g id="tagline" transform="translate(155, 85)">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="11"
          font-weight="500"
          fill="#8B5FD3"
          letter-spacing="1.2"
          text-transform="uppercase">Professional • Trusted • Expert</text>
  </g>
</svg>
