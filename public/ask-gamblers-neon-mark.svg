<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Ask Gamblers - Neon Icon Mark</title>
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="purpleCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2DD1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon "i" - Orange Glow -->
  <g filter="url(#neonGlow)">
    <text x="100" y="115"
          font-family="Arial, sans-serif"
          font-size="110"
          font-weight="900"
          fill="none"
          stroke="#FF6B00"
          stroke-width="1.5"
          text-anchor="middle"
          dominant-baseline="central"
          opacity="0.6">i</text>
  </g>

  <!-- Icon "i" - Main -->
  <g filter="url(#neonGlow)">
    <text x="100" y="115"
          font-family="Arial, sans-serif"
          font-size="110"
          font-weight="900"
          fill="url(#purpleCyan)"
          stroke="#00FFFF"
          stroke-width="0.8"
          text-anchor="middle"
          dominant-baseline="central">i</text>
  </g>
</svg>
