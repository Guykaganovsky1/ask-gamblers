<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Ask Gamblers Logo Mark</title>
  <desc id="desc">Compact casino card badge mark for Ask Gamblers.</desc>
  <defs>
    <linearGradient id="markGold" x1="45" y1="28" x2="153" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3D982"/>
      <stop offset="0.45" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8D6B1F"/>
    </linearGradient>
    <linearGradient id="markCard" x1="52" y1="22" x2="150" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202536"/>
      <stop offset="1" stop-color="#090A10"/>
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#markShadow)">
    <rect x="40" y="48" width="86" height="104" rx="12" fill="#0A0A0F" stroke="#4E421E" stroke-width="3" transform="rotate(-17 83 100)"/>
    <rect x="65" y="38" width="94" height="112" rx="13" fill="url(#markCard)" stroke="url(#markGold)" stroke-width="4" transform="rotate(8 112 94)"/>
    <path d="M96 62 L115 96 L96 130 L77 96 Z" fill="url(#markGold)"/>
    <path d="M77 57 L92 50" stroke="#F3D982" stroke-width="4" stroke-linecap="round"/>
    <circle cx="96" cy="150" r="6" fill="#00E676"/>
  </g>
</svg>
