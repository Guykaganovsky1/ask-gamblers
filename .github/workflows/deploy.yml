name: Deploy to Cloudways

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -f -X POST \
            "https://askgamblers.co.il/api/autodeploy?secret=${{ secrets.DEPLOY_SECRET }}" \
            --max-time 10
          echo "Deploy triggered — check https://askgamblers.co.il"
