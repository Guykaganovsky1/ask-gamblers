name: Deploy to Cloudways

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}" > .env
          echo "NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}" >> .env
          echo "NEXT_PUBLIC_SANITY_API_VERSION=${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}" >> .env
          echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env
          echo "SANITY_WRITE_TOKEN=${{ secrets.SANITY_WRITE_TOKEN }}" >> .env
          echo "SANITY_REVALIDATE_SECRET=${{ secrets.SANITY_REVALIDATE_SECRET }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Prepare deployment packages
        run: |
          tar czf standalone.tar.gz -C .next/standalone .
          tar czf static.tar.gz -C .next/static .
          tar czf public.tar.gz -C public .

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Test connection
        run: |
          sshpass -p "${{ secrets.CLOUDWAYS_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            "${{ secrets.CLOUDWAYS_USERNAME }}@${{ secrets.CLOUDWAYS_HOST }}" "echo connection_ok"

      - name: Upload deployment packages
        run: |
          sshpass -p "${{ secrets.CLOUDWAYS_PASSWORD }}" scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -r \
            standalone.tar.gz static.tar.gz public.tar.gz .env \
            "${{ secrets.CLOUDWAYS_USERNAME }}@${{ secrets.CLOUDWAYS_HOST }}":~/

      - name: Deploy and restart
        run: |
          sshpass -p "${{ secrets.CLOUDWAYS_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o Port=22 \
            "${{ secrets.CLOUDWAYS_USERNAME }}@${{ secrets.CLOUDWAYS_HOST }}" << 'ENDSSH'
            APP_PATH="/home/1553018.cloudwaysapps.com/dzdatjcdrp/public_html"
            
            # Extract standalone
            cd $APP_PATH
            tar xzf ~/standalone.tar.gz
            
            # Extract static files
            mkdir -p .next/static
            cd .next/static
            tar xzf ~/static.tar.gz
            
            # Extract public files
            cd $APP_PATH
            mkdir -p public
            cd public
            tar xzf ~/public.tar.gz
            
            # Copy .env
            cp ~/.env $APP_PATH/.env
            
            # Install pm2 if needed and restart
            cd $APP_PATH
            if [ ! -f "node_modules/.bin/pm2" ]; then
              npm install pm2 --save-dev
            fi
            
            npx pm2 delete ask-gamblers 2>/dev/null || true
            npx pm2 start server.js --name ask-gamblers
            npx pm2 save
            
            # Cleanup
            rm -f ~/standalone.tar.gz ~/static.tar.gz ~/public.tar.gz ~/.env
          ENDSSH
